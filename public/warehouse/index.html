<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArbitLens Data Warehouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #FAFAF9; color: #0A0A0A; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    header { border-bottom: 1px solid #E5E5E5; padding: 12px 24px; position: sticky; top: 0; background: rgba(250,250,249,0.9); backdrop-filter: blur(12px); z-index: 50; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #0A0A0A; }
    .logo-box { width: 28px; height: 28px; background: #0A0A0A; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; }
    nav a { font-size: 12px; font-weight: 500; color: #525252; text-decoration: none; padding: 6px 10px; border-radius: 6px; }
    nav a:hover { background: #F5F5F5; }
    .filters { background: white; border: 1px solid #E5E5E5; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .filters h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    .filter-group { margin-bottom: 12px; }
    .filter-group label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #8A8A8A; margin-bottom: 4px; }
    .filter-group select, .filter-group input { width: 100%; padding: 8px 12px; font-size: 12px; border: 1px solid #E5E5E5; border-radius: 6px; background: white; }
    .filter-row { display: flex; gap: 8px; }
    .filter-row input { width: 50%; }
    .checkbox-group { display: flex; flex-direction: column; gap: 4px; }
    .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; text-transform: none; letter-spacing: normal; }
    .platform-dot { width: 8px; height: 8px; border-radius: 50%; }
    .btn { padding: 8px 16px; font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; }
    .btn-primary { background: #0A0A0A; color: white; }
    .btn-secondary { background: white; border: 1px solid #E5E5E5; }
    .btn:hover { opacity: 0.9; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .stat { background: white; border: 1px solid #E5E5E5; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-value { font-size: 20px; font-weight: 700; }
    .stat-label { font-size: 10px; color: #8A8A8A; }
    .filters-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-tag { padding: 4px 8px; font-size: 10px; background: white; border: 1px solid #E5E5E5; border-radius: 999px; cursor: pointer; }
    .filter-tag:hover { background: #F5F5F5; }
    table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #E5E5E5; border-radius: 8px; overflow: hidden; }
    th { padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 500; color: #8A8A8A; background: #FAFAF9; border-bottom: 1px solid #E5E5E5; }
    td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid #F0F0F0; }
    tr:hover { background: #FAFAF9; }
    .img-thumb { width: 40px; height: 40px; border-radius: 4px; object-fit: contain; background: #F5F5F5; }
    .platform-badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; color: white; }
    .price { font-weight: 600; color: #059669; }
    .match-good { color: #059669; font-weight: 600; }
    .match-ok { color: #D97706; font-weight: 600; }
    .match-low { color: #9CA3AF; }
    .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
    .pagination-info { font-size: 12px; color: #8A8A8A; }
    .pagination-btns { display: flex; gap: 8px; }
    .empty { text-align: center; padding: 48px; color: #8A8A8A; }
    @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/arbitlens" class="logo">
        <div class="logo-box">A</div>
        <span style="font-size: 14px; font-weight: 600;">ArbitLens</span>
      </a>
      <nav>
        <a href="/arbitlens">Dashboard</a>
        <a href="/warehouse" style="font-weight: 600;">Warehouse</a>
        <a href="/arbitlens/categories">Categories</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 4px;">Data Warehouse</h1>
    <p style="font-size: 13px; color: #8A8A8A; margin-bottom: 20px;">Multi-dimensional product exploration across 5 marketplaces</p>

    <div class="stats" id="stats">
      <div class="stat"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Products</div></div>
      <div class="stat"><div class="stat-value" id="stat-avg">-</div><div class="stat-label">Avg Price</div></div>
      <div class="stat"><div class="stat-value" id="stat-matched">-</div><div class="stat-label">Matched</div></div>
      <div class="stat"><div class="stat-value" id="stat-platforms">-</div><div class="stat-label">Platforms</div></div>
    </div>

    <div style="display: flex; gap: 16px;">
      <aside style="width: 240px; flex-shrink: 0;">
        <div class="filters">
          <h3>Filters</h3>
          <div class="filter-group">
            <label>Category</label>
            <select id="filter-category">
              <option value="">All categories</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Platform</label>
            <div class="checkbox-group" id="filter-platforms"></div>
          </div>
          <div class="filter-group">
            <label>Price Range (BRL)</label>
            <div class="filter-row">
              <input type="number" id="filter-min-price" placeholder="Min">
              <input type="number" id="filter-max-price" placeholder="Max">
            </div>
          </div>
          <div class="filter-group">
            <label>Min Sales/mo</label>
            <select id="filter-min-sales">
              <option value="">Any</option>
              <option value="10">>10</option>
              <option value="50">>50</option>
              <option value="100">>100</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Match Quality</label>
            <select id="filter-min-match">
              <option value="">Any</option>
              <option value="0.70">>70%</option>
              <option value="0.80">>80%</option>
              <option value="0.90">>90%</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Sort</label>
            <select id="filter-sort">
              <option value="price_asc">Price ↑</option>
              <option value="price_desc">Price ↓</option>
              <option value="sales_desc">Sales ↓</option>
              <option value="match_desc">Match ↓</option>
            </select>
          </div>
          <div style="display: flex; gap: 8px; margin-top: 12px;">
            <button class="btn btn-primary" onclick="applyFilters()" style="flex: 1;">Apply</button>
            <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
          </div>
        </div>
      </aside>

      <main style="flex: 1; min-width: 0;">
        <div class="filters-row" id="active-filters"></div>
        <div id="results"></div>
        <div class="pagination" id="pagination"></div>
      </main>
    </div>
  </div>

  <script>
    const API_BASE = '/api/arbitlens/explore';
    const CATEGORIES = [
      {slug:'audio',name:'Áudio',icon:'🎙️'},{slug:'eletronicos',name:'Eletrônicos',icon:'📱'},
      {slug:'wearables',name:'Wearables',icon:'⌚'},{slug:'camera',name:'Câmeras',icon:'📷'},
      {slug:'casa',name:'Casa',icon:'🏠'},{slug:'cozinha',name:'Cozinha',icon:'🍳'},
      {slug:'moda',name:'Moda',icon:'👗'},{slug:'beleza',name:'Beleza',icon:'💄'},
      {slug:'saude',name:'Saúde',icon:'🏥'},{slug:'esportes',name:'Esportes',icon:'🏋️'},
      {slug:'pets',name:'Pet Shop',icon:'🐾'},{slug:'infantis',name:'Infantil',icon:'🧸'},
      {slug:'automotivo',name:'Automotivo',icon:'🚗'},{slug:'ferramentas',name:'Ferramentas',icon:'🔧'},
      {slug:'jardim',name:'Jardim',icon:'🌱'},{slug:'iluminacao',name:'Iluminação',icon:'💡'},
      {slug:'papelaria',name:'Papelaria',icon:'📝'},{slug:'moveis',name:'Móveis',icon:'🪑'},
      {slug:'calcados',name:'Calçados',icon:'👟'},{slug:'uncategorized',name:'Sem Categoria',icon:'❓'}
    ];
    const PLATFORMS = [
      {slug:'rakumart-1688',name:'1688',color:'#3B82F6'},
      {slug:'rakumart-taobao',name:'Taobao',color:'#8B5CF6'},
      {slug:'rakumart-alibaba',name:'Alibaba BR',color:'#06B6D4'},
      {slug:'dhgate',name:'DHgate',color:'#F97316'},
      {slug:'alibaba',name:'Alibaba',color:'#EAB308'}
    ];
    const PLATFORM_SHORT = {'rakumart-1688':'1688','rakumart-taobao':'Taobao','rakumart-alibaba':'Alibaba BR','dhgate':'DHgate','alibaba':'Alibaba'};

    let currentPage = 1;
    let currentFilters = {};

    function init() {
      const catSelect = document.getElementById('filter-category');
      CATEGORIES.forEach(c => { const opt = document.createElement('option'); opt.value = c.slug; opt.textContent = c.icon + ' ' + c.name; catSelect.appendChild(opt); });

      const platDiv = document.getElementById('filter-platforms');
      PLATFORMS.forEach(p => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" value="${p.slug}" checked> <span class="platform-dot" style="background:${p.color}"></span> ${p.name}`;
        platDiv.appendChild(label);
      });

      applyFilters();
    }

    function getFilters() {
      const category = document.getElementById('filter-category').value;
      const platforms = Array.from(document.querySelectorAll('#filter-platforms input:checked')).map(i => i.value);
      const min_price = document.getElementById('filter-min-price').value;
      const max_price = document.getElementById('filter-max-price').value;
      const min_sales = document.getElementById('filter-min-sales').value;
      const min_match = document.getElementById('filter-min-match').value;
      const sort = document.getElementById('filter-sort').value;
      return { category, platforms, min_price, max_price, min_sales, min_match, sort };
    }

    function buildUrl(filters, page) {
      const params = new URLSearchParams();
      if (filters.category) params.set('category', filters.category);
      if (filters.platforms.length > 0) params.set('platform', filters.platforms.join(','));
      if (filters.min_price) params.set('min_price', filters.min_price);
      if (filters.max_price) params.set('max_price', filters.max_price);
      if (filters.min_sales) params.set('min_sales', filters.min_sales);
      if (filters.min_match) params.set('min_match', filters.min_match);
      params.set('sort', filters.sort);
      params.set('page', page);
      params.set('limit', '50');
      return API_BASE + '?' + params.toString();
    }

    async function applyFilters() {
      currentFilters = getFilters();
      currentPage = 1;
      await fetchData();
    }

    async function fetchData() {
      const url = buildUrl(currentFilters, currentPage);
      document.getElementById('results').innerHTML = '<div class="empty">Loading...</div>';

      try {
        const res = await fetch(url);
        const data = await res.json();

        document.getElementById('stat-total').textContent = data.total.toLocaleString();
        document.getElementById('stat-avg').textContent = 'R$ ' + (data.aggregates?.avg_price || 0).toFixed(0);
        document.getElementById('stat-matched').textContent = data.aggregates?.matched_count || 0;
        document.getElementById('stat-platforms').textContent = Object.keys(data.platform_counts || {}).length;

        renderActiveFilters();
        renderResults(data.products || []);
        renderPagination(data.total, data.totalPages, data.page);
      } catch (e) {
        document.getElementById('results').innerHTML = '<div class="empty">Error loading data</div>';
      }
    }

    function renderActiveFilters() {
      const div = document.getElementById('active-filters');
      div.innerHTML = '';
      if (currentFilters.category) {
        const cat = CATEGORIES.find(c => c.slug === currentFilters.category);
        div.innerHTML += `<span class="filter-tag" onclick="removeFilter('category')">${cat?.icon} ${cat?.name} ✕</span>`;
      }
      currentFilters.platforms.forEach(p => {
        div.innerHTML += `<span class="filter-tag" onclick="removePlatform('${p}')">${PLATFORM_SHORT[p] || p} ✕</span>`;
      });
    }

    function removeFilter(type) {
      document.getElementById('filter-category').value = '';
      applyFilters();
    }

    function removePlatform(slug) {
      const cb = document.querySelector(`#filter-platforms input[value="${slug}"]`);
      if (cb) cb.checked = false;
      applyFilters();
    }

    function clearFilters() {
      document.getElementById('filter-category').value = '';
      document.querySelectorAll('#filter-platforms input').forEach(i => i.checked = true);
      document.getElementById('filter-min-price').value = '';
      document.getElementById('filter-max-price').value = '';
      document.getElementById('filter-min-sales').value = '';
      document.getElementById('filter-min-match').value = '';
      document.getElementById('filter-sort').value = 'price_asc';
      applyFilters();
    }

    function renderResults(products) {
      if (products.length === 0) {
        document.getElementById('results').innerHTML = '<div class="empty">No products match your filters</div>';
        return;
      }
      let html = '<table><thead><tr><th></th><th>Product</th><th>Platform</th><th style="text-align:right">Price</th><th style="text-align:right">Sales</th><th style="text-align:right">Match</th></tr></thead><tbody>';
      products.forEach(p => {
        const imgUrl = p.image_urls?.[0] ? `/api/proxy/image?url=${encodeURIComponent(p.image_urls[0])}` : '';
        const color = {'rakumart-1688':'#3B82F6','rakumart-taobao':'#8B5CF6','rakumart-alibaba':'#06B6D4','dhgate':'#F97316','alibaba':'#EAB308'}[p.platform] || '#666';
        const label = {'rakumart-1688':'1688','rakumart-taobao':'Taobao','rakumart-alibaba':'Alibaba BR','dhgate':'DHgate','alibaba':'Alibaba'}[p.platform] || p.platform;
        const matchClass = p.confidence >= 0.80 ? 'match-good' : p.confidence >= 0.60 ? 'match-ok' : 'match-low';
        html += `<tr>
          <td><img class="img-thumb" src="${imgUrl}" alt="" onerror="this.style.display='none'"></td>
          <td><a href="${p.url}" target="_blank" style="color:#0A0A0A;text-decoration:none;font-weight:500">${(p.title||'').substring(0,60)}...</a></td>
          <td><span class="platform-badge" style="background:${color}">${label}</span></td>
          <td style="text-align:right" class="price">${p.price ? 'R$ '+p.price.toFixed(2) : '—'}</td>
          <td style="text-align:right;color:#8A8A8A">${p.sales_30d || '—'}</td>
          <td style="text-align:right" class="${matchClass}">${p.confidence ? (p.confidence*100).toFixed(0)+'%' : '—'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('results').innerHTML = html;
    }

    function renderPagination(total, totalPages, page) {
      if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
      let html = `<div class="pagination-info">Page ${page} of ${totalPages} (${total.toLocaleString()} products)</div><div class="pagination-btns">`;
      if (page > 1) html += `<button class="btn btn-secondary" onclick="goPage(${page-1})">← Prev</button>`;
      if (page < totalPages) html += `<button class="btn btn-secondary" onclick="goPage(${page+1})">Next →</button>`;
      html += '</div>';
      document.getElementById('pagination').innerHTML = html;
    }

    function goPage(p) { currentPage = p; fetchData(); }

    init();
  </script>
</body>
</html>
